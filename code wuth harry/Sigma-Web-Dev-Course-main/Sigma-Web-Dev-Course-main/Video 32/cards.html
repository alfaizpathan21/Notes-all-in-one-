        *{
            padding: 0%;
            margin: 0%;
        }
        body{
            background-color: gray;

        }
        .card{
            background-color: white;
            width: 200px;
            height: 320px;
            border-radius: 7px;

        }
        .image{
            padding: 5px;
            
        }
        .image img{
            border-radius: 10px;
        }
        .content{
            padding: 5px 13px;
        }
        .content p{
            font-size: 13px;
            font-style: italic;
            color: gray;
        }
        .cap{
            padding: 0 34px;
        }
        .cap span{
            border: 1px solid gray;
            padding: 1px 4px;
            border-radius: 14px;
            font-size: 13px;
        }
        .cap div, box {
            background-color: greenyellow;
            border: 4px solid greenyellow;
            width: 7px;
            display: inline-block;
            margin-left: 0px;
            height: 13px;
            border-radius: 7px ;
        }
        .button{
            text-align: center;
        }
        .button button{
            padding: 4px 8px;
            border-radius: 14px;
            background-color: rgb(170, 206, 237);
             color: blue; 
            border: none;
            font-size: 12px;
            margin-top: 4px;   
            font-weight: bolder;
            }
