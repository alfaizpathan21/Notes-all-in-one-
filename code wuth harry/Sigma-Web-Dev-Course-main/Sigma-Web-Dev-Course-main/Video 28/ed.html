<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css posotion</title>
    <style>
        * {
            margin: 0%;
            padding: 0%;
        }

        .parent {
            padding: 33px;
            margin: 34px;
            border: 2px solid purple;
            position: absolute;
        }

        .box {
            border: 2px solid black;
            height: 433px;
            width: 280vw;
            padding: 3px;
            margin: 3px;
        }

        .box1 {
            background-color: aqua;
            position: sticky;
            bottom: 0px;
             
            
          
        }

        .box2 {
            
            background-color: antiquewhite;
            position: relative;
            top: -44px; 
            left: 22px;
            z-index: -74;

        }

        .box3 {
            background-color: aquamarine
        }

        .box4 {
            background-color: blueviolet;
            position: relative;
            top: -44px; 
            left: 22px;
            z-index: 74;
            position: sticky;
            top: 0%;

        }
    </style>
</head>




<body>
    <div class="parent">
        <div class="box box1"></div>
        <div class="box box2"></div>
        <div class="box box3"></div>
        <div class="box box4"></div>
    </div>

</body>

</html>
