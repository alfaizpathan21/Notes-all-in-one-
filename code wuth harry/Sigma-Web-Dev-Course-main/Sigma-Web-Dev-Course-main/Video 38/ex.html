<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css flex box</title>

    <style>
        .container {
            border: 2px solid black;
            display: flex;
            height: 440px;

            align-items: center;
            flex-wrap: wrap;

        }

        .item {
            height: 50px;
            width: 50px;
            border: 2px solid rgb(109, 14, 14);
            margin: 40px;
            background-color: brown;
            flex-wrap: wrap;
        }
    </style>
</head>

<body>


    <main>
        <div class="container">
            <div class="item">1</div>
            <div class="item">2</div>
            <div class="item" order-2>3</div>
            <div class="item"></div>
            <div class="item" order-1>4</div>
            <div class="item"></div>
            <div class="item">5</div>
            <div class="item">6</div>
            <div class="item">7</div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>

            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
        </div>
    </main>
</body>

</html>
