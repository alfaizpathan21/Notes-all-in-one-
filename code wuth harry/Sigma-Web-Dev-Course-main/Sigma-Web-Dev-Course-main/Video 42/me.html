<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .box{
            height: 70px;
            width: 70px;
            border: 2px solid red;
            justify-content: center;
            align-items: center;
            background-color: antiquewhite;
             transform-origin: 0%;
             transform:rotateZ(10deg);
             display: flex;
            
        }
        .container{
            width: 500px;
            height: 500px;
            border: 2px solid rgb(26, 3, 50);
        }
    </style>
</head>
<body>
    
    <div class="container">
        <div class="box">hello</div>
    </div>
</body>
</html>
