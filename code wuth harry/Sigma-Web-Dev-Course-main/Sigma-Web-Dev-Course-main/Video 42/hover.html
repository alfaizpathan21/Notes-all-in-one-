<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        h1:hover {
            background-color: rgb(118, 118, 213);
            color: rgb(160, 231, 231);
            cursor: pointer;

        }

        .box{
            border: 2px solid black;    
            padding: 5px;
            box-shadow: 10px 10px 20px rgba(237, 6, 6, 0.3);
            transition: background-color 0.5s  ease-in-out;
            
            
            
        }
        .box:hover{
            background-color: rgb(5, 5, 169);
            color: aquamarine;
        }
    </style>
</head>

<body>
    <h1>
        hello
    </h1>
    <div class="box">
        Lorem ipsum dolor, sit amet consectetur adipisicing elit. Officia rem earum libero repellendus esse suscipit
        dolorem cum aliquam, sunt nam. Laboriosam, saepe?
    </div>
</body>

</html>
