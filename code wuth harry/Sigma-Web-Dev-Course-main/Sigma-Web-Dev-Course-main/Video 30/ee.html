<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .box{
            border: 4px solid red;
            background-color: rgb(0, 0, 0);
            color: white;
            width: 300px;
            position: relative;
            margin: 50px;
            font-size: 16px;
            border-radius: 10px;

        }
        .box::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            translate: -50% -50%;
            left: 50%;
            top: 50%;
            border-radius: 15px;
            z-index: -1;
            padding: 10px;
            background: conic-gradient(

                from 0deg,
                transparent 70%,
                #ff5f6d,
                #ffc371,
                #ffd700,
                #32cd32,
                #00fa9a,
                #1e90ff,
                #9370db,
                #ff5f6d               
            );
            border-radius: 10px;
            animation: 3s rotate linear infinite;
            
        }
        @property --direction{

        }

        .box::before{
            filter: blur(0.5);
            opacity: 0.8;
        }

        @keyframes rotate{
            from{
                --direction: 0deg;

            }
            to{
                --direction: 360deg;
            }
        }


body{
    background-color: rgba(14, 27, 27, 0.822);
}
    </style>
</head>
<body>
    <div class="box">
    Lorem, ipsum dolor sit amet consectetur adipisicing elit. Obcaecati ratione consequatur error? Minima a laboriosam animi, sapiente voluptatum et repellat illo rem porro, perspiciatis labore impedit reiciendis nesciunt recusandae! Pariatur!
    </div>
    <div class="c"></div>
    
</body>
</html>
