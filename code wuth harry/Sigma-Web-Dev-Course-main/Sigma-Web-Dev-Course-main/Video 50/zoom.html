<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box {
            border: 2px solid black;
            width: 400px;
            margin: 10px auto;
            position: relative;
            overflow: hidden;

        }
        .box:hover{
            box-shadow: 10px 10px 10px rgb(0, 0, 0), 0 0 25px blue, 0 0 5px darkblue;
        }

        .box img {
            width: 100%;
            height: auto;
        }

        .box:hover img {
            transform: scale(0);
            transition: all 0.5s ease;
        }
        .box .text{
            background-color: aqua;
            position: absolute;
            left: 0;
            top:0;
            width: 100%;
            height: 100%;
            padding: 30px;
            box-sizing: border-box;
            transform: scale(0) rotate(-360deg);
            opacity: 0;
            transition: all 1s ease;

        }

        .box:hover .text{
            opacity: 1;
            transform: scale(1) rotate(0deg);
            transition-delay: 0.2s;

        }
    </style>
</head>

<body>
    <h1>Zoom effect</h1>
    <div class="box">
        <img src="iron.jpg" alt="">
        <div class="text">
good night allah hafiz 
            </div>
</body>

</html>
