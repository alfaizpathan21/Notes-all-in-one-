<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            background-color: rgb(140, 188, 230);
            width: 50vw;
            height: 40vh;
          
        .box{
            background-color: rgb(224, 8, 8);
            width: 5vw;
            height: 4vh;
            transition-property: all;
            transition-duration: 4s;
            transition-timing-function: ease-in-out;
            transition-delay: 1s;
        }
        }
        .translate{
            transform: translateX(10vw) translateY(10vh) scale(3);
            background-color: rgb(53, 181, 181);
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="box translate">

        </div>
    </div>
</body>
</html>
